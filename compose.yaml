name: VPA
services:
  VPA:
    image: mwdle/vpa:latest
    container_name: VPA
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./Dockerfile

    environment:
      - NODE_ENV=production
      - TRUSTED_PROXIES="172.16.0.0/16"
      - APP_TITLE=Virtual Public Artboard
      - FILE_NUM_LIMIT=50
    networks:
      - VPA
    volumes:
      - ${DOCKER_VOLUMES}/VPA/VirtualPublicArtboard:/var/lib/vpa

    user: "${UID}:${GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: "journald"
    healthcheck:
      test: CMD wget --no-verbose --tries=1 --spider http://localhost:3000/health
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 100M
          pids: 25
        reservations:
          memory: 30M

networks:
  VPA:
    name: VPA
    external: true
